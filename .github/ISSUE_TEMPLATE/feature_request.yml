name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or pain point. The more concrete, the better.
      placeholder: "There's no way to ground an email address spelled out letter-by-letter in ASR output."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like saidso to do? A rough API sketch is helpful.
      render: python
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What have you already tried or worked around?
    validations:
      required: false

  - type: checkboxes
    id: roadmap
    attributes:
      label: Is this already on the roadmap?
      description: Check docs/ROADMAP.md before filing.
      options:
        - label: I checked the roadmap and this isn't listed there.
    validations:
      required: true
